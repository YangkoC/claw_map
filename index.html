<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- 微信分享 meta -->
  <meta property="og:title" content="钓龙虾地图 - 发现你身边的钓点">
  <meta property="og:description" content="查看附近的钓龙虾地点，分享你的私藏钓点">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://你的域名.com/">
  <meta property="og:image" content="https://你的域名.com/assets/share.png">

  <title>钓龙虾地图</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <!-- ====== 加载状态 ====== -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>正在定位...</p>
  </div>

  <!-- ====== 应用容器 ====== -->
  <div class="app-container">

    <!-- 搜索栏 -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索钓点名称或地址..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>

    <!-- 内容区域 -->
    <div class="content-area">
      <!-- 地图 -->
      <div id="map-container"></div>

      <!-- 列表 -->
      <div id="list-container">
        <div id="list-loading">加载中...</div>
        <div id="spot-list"></div>
      </div>
    </div>

    <!-- 底部标签栏 -->
    <div class="tab-bar">
      <button class="tab active" data-tab="map">
        <span class="tab-icon">🗺️</span>
        <span>地图</span>
      </button>
      <button class="tab" data-tab="list">
        <span class="tab-icon">📋</span>
        <span>列表</span>
      </button>
      <button class="tab" data-tab="submit">
        <span class="tab-icon">✏️</span>
        <span>提交</span>
      </button>
    </div>
  </div>

  <!-- ====== 提交表单浮层（动态渲染） ====== -->
  <div id="submit-container"></div>

  <!-- ====== JS 脚本（按顺序加载） ====== -->
  <script src="js/supabase.js"></script>
  <script src="js/map.js"></script>
  <script src="js/submit.js"></script>
  <script src="js/app.js"></script>

  <script>
    /**
     * ========== 配置区 ==========
     * 使用前请替换以下凭证
     */
    App.boot({
      // Supabase 配置（替代 LeanCloud）
      supabase: {
        supabaseUrl: 'https://rinqjjaowwejjqlzofsq.supabase.co',
        supabaseAnonKey: 'sb_publishable_k-0qg6e7LkHuKtZtQ-TpLw_ep5gNiig'
      },
      // 高德地图配置
      amap: {
        amapKey: '911869ff33a0af0b03b562e05085729b',
        amapSecurityJsCode: '7519f5624e16bef6193f0282f9d2adbc'
      }
    });

    // ========== 搜索功能 ==========
    (function () {
      var searchInput = document.getElementById('search-input');
      var searchTimer = null;

      searchInput.addEventListener('input', function () {
        clearTimeout(searchTimer);
        var keyword = searchInput.value.trim();
        searchTimer = setTimeout(function () {
          App.filterSpots(keyword);
        }, 300);
      });
    })();
  </script>

</body>
</html>
